esphome:
  name: smartmeter-reader-esphome
  friendly_name: Smartmeter Reader ESPHome

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  # Keep hardware UART free for the SML meter on GPIO3.
  baud_rate: 0

api:
  encryption:
    key: !secret enc_key_smartmeter

ota:
  platform: esphome
  password: !secret ota_pw_smartmeter

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      manual_ip:
        static_ip: !secret static_ip_smartmeter
        gateway: !secret gateway
        subnet: 255.255.255.0

  on_connect:
    - logger.log: "wifi connected"
  on_disconnect:
    - logger.log: "wifi disconnected"

uart:
  id: uart_bus
  rx_pin: GPIO3
  baud_rate: 9600

sml:
  id: mysml
  uart_id: uart_bus

sensor:
  - platform: sml
    name: "Total Energy Consumed"
    id: total_energy_consumed
    sml_id: mysml
    obis_code: "1-0:1.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.0001
      - throttle: 9s

  - platform: sml
    name: "Current power"
    id: current_power
    sml_id: mysml
    obis_code: "1-0:16.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement

  - platform: wifi_signal
    name: "ESP32 WiFi RSSI"
    id: wifi_rssi
    entity_category: diagnostic
    update_interval: 300s

  - platform: uptime
    name: "ESP32 Uptime"
    id: esp32_uptime
    entity_category: diagnostic
    update_interval: 300s

binary_sensor:
  - platform: status
    name: "ESP32 Status"
    id: esp32_status

esphome:
  name: smartmeter-reader-esphome
  friendly_name: Smartmeter Reader ESPHome

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  baud_rate: 0

# Enable Home Assistant API
api:
  encryption:
    key: !secret enc_key_smartmeter

ota:
  platform: esphome
  password: !secret ota_pw_smartmeter

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password
    manual_ip:
      static_ip: !secret static_ip_smartmeter
      gateway: !secret gateway
      subnet: 255.255.255.0
  on_connect:
    - logger.log: "wifi connected"

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  #ap:
  #  ssid: "Smartmeter-Reader-Esphome"
  #  password: "ezBwInieMFGR"

#captive_portal:


uart:
  id: uart_bus
  rx_pin: GPIO3
  baud_rate: 9600

sml:
  uart_id: uart_bus
  id: mysml

sensor:
  - platform: sml
    name: "Total Energy Consumed"
    sml_id: mysml
    obis_code: "1-0:1.8.0"
    unit_of_measurement: kWh
    accuracy_decimals: 1
    device_class: energy
    state_class: total_increasing
    filters:
      - multiply: 0.0001
      - throttle: 9s
  #- platform: sml
  #  name: "Total Energy Provided"
  #  sml_id: mysml
  #  obis_code: "1-0:2.8.0"
  #  unit_of_measurement: kWh
  #  accuracy_decimals: 1
  #  device_class: energy
  #  state_class: total_increasing
  #  filters:
  #    - multiply: 0.0001
  - platform: sml
    name: "Current power"
    sml_id: mysml
    obis_code: "1-0:16.7.0"
    unit_of_measurement: W
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
  - platform: wifi_signal
    name: "ESP32 WiFi RSSI"
    update_interval: 300s
